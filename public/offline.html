<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b1020;
        color: #fff;
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        width: min(560px, calc(100% - 48px));
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 18px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.45;
      }
      a {
        display: inline-block;
        text-decoration: none;
        background: #6d28d9;
        color: #fff;
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>
        This kiosk/app temporarily lost internet connection. Please reconnect and try again.
      </p>
      <a href="/menu">Go to Menu</a>
    </div>
  </body>
</html>
